<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

<body>
    <div class="container">
        <div class="row">
            <div class="col text-center">
                <h1>Checkout form</h1>
                <p>Below is an example form built entirely with Bootstrap's form controls. Each required form group has

            </div>
        </div>
        <div class="row">
            <div class="col">
                <h1>Billing address</h1>
            </div>
        </div>
        <div class="row">
            <div class="col">
                <label for="">First name</label>
                <input class="form-control" type="text" name="" id="">
            </div>
            <div class="col">
                <label for="">Last name</label>
                <input class="form-control" type="text" name="" id="">
            </div>
        </div>
        <div class="row">
            <div class="col mt-5">
                <label for="">Username</label><br>
                <input class="form-control" type="text" name="Username" placeholder="Username" id="">
            </div>
        </div>
        <div class="col mt-3">
            <label for="">Email (Optional)</label><br>
            <input class="form-control" type="text" name="" placeholder="" id="">
        </div>
        <div class="col mt-3">
            <label for="">Address</label><br>
            <input class="form-control" type="text" name="" placeholder="" id="">
        </div>
        <div class="col mt-3">
            <label for="">Address 2 (Optional)</label><br>
            <input class="form-control" type="text" name="" placeholder="" id="">
        </div>


        <div class="row">
            <div class="col mt-5">
                <label for="Name">Country</label>
                <select name="id">
                    <option value="choosc">choosc</option>
                    <option value="united">united</option>

                </select>
            </div>
            <div class="col mt-5">
                <label for="Name">State</label>
                <select name="id">
                    <option value="choosc">choosc</option>
                    <option value="united">united</option>

                </select>
            </div>
            <div class="col mt-5">
                <label for="Name">Zip</label>
                <select name="id">
                    <option value=""></option>
                    <option value=""></option>

                </select>
            </div>




        </div>








        <!-- Bootstrap CDN -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
